<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="360" viewBox="0 0 1400 360" role="img" aria-labelledby="title desc">
  <title id="title">Follow-Up Radar</title>
  <desc id="desc">Follow-Up Radar banner in navy, coral, teal, cream, and gold.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07182b"/>
      <stop offset="0.55" stop-color="#0b2239"/>
      <stop offset="1" stop-color="#102c44"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#2ec4b6" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#2ec4b6" stop-opacity="0.72"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#2ec4b6" opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="1400" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1400" height="360" rx="28" fill="url(#dots)" opacity="0.65"/>
  <rect x="14" y="14" width="1372" height="332" rx="22" fill="none" stroke="#244c64" stroke-width="2"/>
  <g transform="translate(190 180)">
    <circle r="134" fill="#081a2d" stroke="#2ec4b6" stroke-width="3" opacity="0.96"/>
    <circle r="98" fill="none" stroke="#2ec4b6" stroke-width="2" opacity="0.65"/>
    <circle r="63" fill="none" stroke="#2ec4b6" stroke-width="2" opacity="0.55"/>
    <circle r="30" fill="none" stroke="#2ec4b6" stroke-width="2" opacity="0.7"/>
    <line x1="-145" y1="0" x2="145" y2="0" stroke="#2ec4b6" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="-145" x2="0" y2="145" stroke="#2ec4b6" stroke-width="2" opacity="0.7"/>
    <path d="M0 0 L96 -96 A136 136 0 0 1 136 0 Z" fill="url(#beam)"/>
    <line x1="0" y1="0" x2="104" y2="-104" stroke="#2ec4b6" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
    <circle r="18" fill="#ff6b6b"/>
    <circle r="7" fill="#f7f1e3"/>
    <circle cx="68" cy="-63" r="8" fill="#ff6b6b"/>
    <circle cx="-72" cy="48" r="7" fill="#2ec4b6"/>
    <circle cx="35" cy="87" r="6" fill="#f2b84b"/>
    <circle cx="-44" cy="-78" r="5" fill="#2ec4b6"/>
  </g>
  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="385" y="118" font-size="65" font-weight="800" fill="#f7f1e3" letter-spacing="1">FOLLOW-UP</text>
    <text x="385" y="207" font-size="90" font-weight="900" fill="#ff6b6b" letter-spacing="3">RADAR</text>
    <line x1="389" y1="226" x2="860" y2="226" stroke="#2ec4b6" stroke-width="3" opacity="0.8"/>
    <circle cx="624" cy="226" r="5" fill="#2ec4b6"/>
    <text x="390" y="266" font-size="26" fill="#f7f1e3"><tspan fill="#2ec4b6" font-weight="700">Track</tspan><tspan> what's waiting. </tspan><tspan fill="#2ec4b6" font-weight="700">Know</tspan><tspan> what's next.</tspan></text>
    <text x="390" y="306" font-size="17" font-weight="700" fill="#a9b7c4" letter-spacing="2.1">QUOTES  •  APPROVALS  •  REPLIES  •  DOCUMENTS  •  CALLBACKS</text>
  </g>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="960" y="56" width="380" height="68" rx="14" fill="#132f49" stroke="#28526d"/>
    <rect x="960" y="56" width="7" height="68" rx="4" fill="#ff6b6b"/>
    <circle cx="1001" cy="90" r="20" fill="#ff6b6b"/>
    <path d="M990 83 h22 a6 6 0 0 1 6 6 v2 a6 6 0 0 1-6 6 h-9 l-6 5 v-5 h-7 a6 6 0 0 1-6-6 v-2 a6 6 0 0 1 6-6z" fill="none" stroke="#fff" stroke-width="2"/>
    <text x="1034" y="86" font-size="19" font-weight="700" fill="#f7f1e3">Client follow-up</text>
    <text x="1034" y="107" font-size="14" fill="#a9b7c4">Waiting on reply</text>
    <rect x="1257" y="69" width="66" height="24" rx="7" fill="#ff6b6b"/>
    <text x="1290" y="86" text-anchor="middle" font-size="13" font-weight="800" fill="#102033">TODAY</text>
    <rect x="960" y="142" width="380" height="68" rx="14" fill="#132f49" stroke="#28526d"/>
    <rect x="960" y="142" width="7" height="68" rx="4" fill="#2ec4b6"/>
    <circle cx="1001" cy="176" r="20" fill="#2ec4b6"/>
    <path d="M989 168 h24 v16 h-24z M989 168 l12 9 12-9" fill="none" stroke="#fff" stroke-width="2"/>
    <text x="1034" y="172" font-size="19" font-weight="700" fill="#f7f1e3">Proposal check-in</text>
    <text x="1034" y="193" font-size="14" fill="#a9b7c4">Reminder scheduled</text>
    <rect x="1231" y="155" width="92" height="24" rx="7" fill="#2ec4b6"/>
    <text x="1277" y="172" text-anchor="middle" font-size="13" font-weight="800" fill="#102033">TOMORROW</text>
    <rect x="960" y="228" width="380" height="68" rx="14" fill="#132f49" stroke="#28526d"/>
    <rect x="960" y="228" width="7" height="68" rx="4" fill="#f2b84b"/>
    <circle cx="1001" cy="262" r="20" fill="#f2b84b"/>
    <path d="M994 249 q4 14 16 23 l7-6 -7-7 -5 4 q-7-5-9-12 l5-3 -4-8z" fill="#fff"/>
    <text x="1034" y="258" font-size="19" font-weight="700" fill="#f7f1e3">Vendor update</text>
    <text x="1034" y="279" font-size="14" fill="#a9b7c4">Callback due Friday</text>
    <rect x="1248" y="241" width="75" height="24" rx="7" fill="#f2b84b"/>
    <text x="1285" y="258" text-anchor="middle" font-size="13" font-weight="800" fill="#102033">FRIDAY</text>
  </g>
  <text x="35" y="336" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#f2b84b" letter-spacing="1.4">DIETRICH AI LABS</text>
</svg>